services:
  postgres:
    image: postgres:17-alpine
    container_name: koms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-koms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-koms}
    ports:
      - "${POSTGRES_PORT:-5433}:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: koms-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-koms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-koms}
      DATABASE_URL: postgresql://${POSTGRES_USER:-koms}:${POSTGRES_PASSWORD:-koms_secret}@postgres:5432/${POSTGRES_DB:-koms}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
    ports:
      - "${PORT:-3000}:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koms-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-koms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-koms}
      DATABASE_URL: postgresql://${POSTGRES_USER:-koms}:${POSTGRES_PASSWORD:-koms_secret}@postgres:5432/${POSTGRES_DB:-koms}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["bun", "run", "src/worker.ts"]

volumes:
  postgres_data:
  redis_data:
